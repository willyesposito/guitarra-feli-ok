<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap');

/* ── RESET & BASE ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#1A0A2E;
  --card:#2D1B4E;
  --card2:#3D2460;
  --pink:#FF6B9D;
  --yellow:#FFD93D;
  --teal:#4ECDC4;
  --purple:#A855F7;
  --orange:#FF8C42;
  --green:#4ADE80;
  --red:#FF4545;
  --text:#F0E6FF;
  --muted:rgba(240,230,255,.55);
}
html,body{
  height:100%;width:100%;overflow:hidden;
  font-family:'Nunito',sans-serif;
  background:var(--bg);color:var(--text);
}

/* ── STARFIELD ── */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(1px 1px at 8% 12%,rgba(255,255,255,.7) 0%,transparent 100%),
    radial-gradient(1px 1px at 22% 58%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(2px 2px at 43% 7%,rgba(255,255,255,.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 66% 33%,rgba(255,255,255,.35) 0%,transparent 100%),
    radial-gradient(1px 1px at 80% 72%,rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(2px 2px at 14% 83%,rgba(255,255,255,.45) 0%,transparent 100%),
    radial-gradient(1px 1px at 55% 91%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 91% 18%,rgba(255,255,255,.55) 0%,transparent 100%),
    radial-gradient(1px 1px at 37% 45%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(2px 2px at 74% 9%,rgba(255,255,255,.5) 0%,transparent 100%);
}

/* ── CANVAS ── */
#cnv{position:fixed;inset:0;pointer-events:none;z-index:99;}

/* ── TOAST ── */
.toast{
  position:fixed;top:12px;left:50%;
  transform:translateX(-50%) translateY(-120px);
  background:linear-gradient(135deg,var(--pink),var(--purple));
  color:white;font-family:'Fredoka One',cursive;font-size:1rem;
  padding:10px 22px;border-radius:50px;
  box-shadow:0 6px 24px rgba(168,85,247,.5);
  z-index:200;transition:transform .4s cubic-bezier(.34,1.56,.64,1);
  white-space:nowrap;max-width:90vw;text-align:center;
}
.toast.show{transform:translateX(-50%) translateY(0);}

/* ── APP SHELL: fixed 4-zone layout ── */
#app{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  z-index:1;
  max-width:520px;margin:0 auto;
}

/* ZONE 1: Header */
#zone-header{
  flex-shrink:0;
  padding:10px 16px 0;
}
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.hdr-day{
  font-family:'Fredoka One',cursive;font-size:1rem;
  background:linear-gradient(135deg,var(--pink),var(--yellow));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hdr-stars{
  font-family:'Fredoka One',cursive;font-size:1rem;color:var(--yellow);
  display:flex;align-items:center;gap:4px;
}
.hdr-rank{font-size:.72rem;color:var(--muted);font-weight:700;display:flex;align-items:center;gap:4px;}

/* Progress bar */
.step-bar{display:flex;gap:5px;padding-bottom:10px;}
.step-pip{
  flex:1;height:6px;border-radius:3px;
  background:rgba(255,255,255,.12);transition:background .4s;
}
.step-pip.done{background:var(--teal);}
.step-pip.active{background:var(--pink);box-shadow:0 0 8px rgba(255,107,157,.6);}

/* ZONE 2: Content (fills remaining space) */
#zone-content{
  flex:1;overflow:hidden;
  padding:0 16px;
  display:flex;flex-direction:column;
}

/* ZONE 3: Footer button */
#zone-footer{
  flex-shrink:0;
  padding:10px 16px 16px;
}
.main-btn{
  width:100%;padding:16px;border-radius:18px;border:none;
  font-family:'Fredoka One',cursive;font-size:1.2rem;
  cursor:pointer;transition:all .2s;
  background:linear-gradient(135deg,var(--pink),var(--purple));
  color:white;box-shadow:0 6px 20px rgba(168,85,247,.45);
}
.main-btn:active{transform:scale(.97);}
.main-btn.green{background:linear-gradient(135deg,var(--green),#16A34A);box-shadow:0 6px 20px rgba(74,222,128,.4);color:#071A0A;}
.main-btn.teal{background:linear-gradient(135deg,var(--teal),#2dd4bf);box-shadow:0 6px 20px rgba(78,205,196,.4);color:#071A1A;}
.main-btn.yellow{background:linear-gradient(135deg,var(--yellow),#B45309);box-shadow:0 6px 20px rgba(255,217,61,.4);color:#1A0F00;}
.main-btn:disabled{opacity:.4;cursor:default;transform:none;}

/* ── CONTENT BLOCKS ── */
.content-block{
  flex:1;display:flex;flex-direction:column;
  animation:fadeIn .3s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

.block-title{
  font-family:'Fredoka One',cursive;font-size:1.35rem;
  text-align:center;margin-bottom:8px;line-height:1.2;
}
.block-subtitle{
  font-size:.82rem;color:var(--muted);text-align:center;
  font-weight:600;margin-bottom:10px;line-height:1.4;
}

/* Card within content */
.c-card{
  background:var(--card);border-radius:16px;
  padding:14px;margin-bottom:10px;
  border:1px solid rgba(255,255,255,.07);
  flex-shrink:0;
}
.c-card-title{
  font-family:'Fredoka One',cursive;font-size:1rem;
  color:var(--yellow);margin-bottom:8px;
}
.tip{
  background:rgba(78,205,196,.1);border-left:3px solid var(--teal);
  border-radius:0 10px 10px 0;padding:8px 12px;
  font-size:.8rem;color:rgba(240,230,255,.85);line-height:1.5;margin:8px 0;
  flex-shrink:0;
}
.tip strong{color:var(--teal);}

/* ── GUITAR SVG BLOCK ── */
.guitar-wrap{flex:1;display:flex;flex-direction:column;min-height:0;}
.guitar-svg-container{flex:1;display:flex;justify-content:center;align-items:center;min-height:0;}
.guitar-svg-container svg{max-height:100%;width:auto;}
.part-buttons{display:flex;flex-wrap:wrap;gap:5px;margin:8px 0;flex-shrink:0;}
.part-btn{
  padding:6px 12px;border-radius:16px;border:2px solid rgba(255,255,255,.12);
  background:var(--card);color:var(--muted);
  font-family:'Nunito',sans-serif;font-weight:800;font-size:.75rem;
  cursor:pointer;transition:all .2s;
}
.part-btn.sel{background:rgba(255,107,157,.15);border-color:var(--pink);color:var(--pink);}
.part-desc{
  background:rgba(255,107,157,.08);border-left:3px solid var(--pink);
  border-radius:0 10px 10px 0;padding:10px 12px;
  font-size:.8rem;color:rgba(240,230,255,.85);line-height:1.5;
  display:none;flex-shrink:0;
}
.part-desc.show{display:block;}
.part-desc strong{color:var(--pink);}
.parts-progress{
  display:flex;gap:4px;justify-content:center;margin:6px 0;flex-shrink:0;
}
.pp-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.15);}
.pp-dot.done{background:var(--pink);}

/* ── STRINGS BLOCK ── */
.string-rows{display:flex;flex-direction:column;gap:7px;flex:1;justify-content:center;}
.string-row{
  background:var(--card2);border-radius:12px;padding:11px 14px;
  display:flex;align-items:center;gap:12px;cursor:pointer;
  border:2px solid transparent;transition:all .2s;
}
.string-row.played{border-color:rgba(255,255,255,.2);}
.string-bar{border-radius:3px;flex-shrink:0;width:28px;}
.string-row-info{flex:1;}
.string-row-name{font-weight:800;font-size:.88rem;}
.string-row-hint{font-size:.72rem;color:var(--muted);margin-top:1px;}
.string-check{font-size:1.1rem;flex-shrink:0;}

/* ── NOTES BLOCK ── */
.notes-grid-7{
  display:grid;grid-template-columns:repeat(7,1fr);gap:5px;flex-shrink:0;
}
.note-card{
  background:var(--card2);border-radius:10px;padding:8px 3px;
  text-align:center;cursor:pointer;transition:all .2s;border:2px solid transparent;
}
.note-card.playing{
  border-color:var(--yellow);background:rgba(255,217,61,.15);
  transform:translateY(-3px);box-shadow:0 6px 18px rgba(255,217,61,.35);
}
.note-name{font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--yellow);}
.note-eng{font-size:.65rem;color:var(--teal);font-weight:700;margin-top:2px;}

/* ── GUSANO BLOCK ── */
.bella-track{
  position:relative;height:52px;background:rgba(255,255,255,.04);
  border-radius:12px;overflow:hidden;margin-bottom:8px;flex-shrink:0;
}
.bella-runner{
  position:absolute;top:50%;transform:translateY(-50%);
  font-size:2rem;transition:left .7s cubic-bezier(.25,.46,.45,.94);left:0%;line-height:1;
}
.bella-run{animation:bellaA .35s infinite;}
@keyframes bellaA{0%,100%{transform:translateY(-50%) rotate(-3deg);}50%{transform:translateY(-62%) rotate(3deg);}}
.fret-grid{display:flex;flex-direction:column;gap:3px;flex:1;min-height:0;overflow:hidden;}
.fret-row-g{display:grid;gap:3px;}
.fret-lbl-g{
  font-size:.68rem;font-weight:800;display:flex;align-items:center;
  padding:0 5px;border-radius:6px;
}
.fret-cell-g{
  height:34px;background:rgba(255,255,255,.05);border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-size:.68rem;font-weight:700;color:rgba(240,230,255,.25);
  border:2px solid transparent;transition:all .15s;
}
.fret-cell-g.cur{
  background:linear-gradient(135deg,rgba(255,107,157,.35),rgba(168,85,247,.2));
  border-color:var(--pink);color:white;font-size:.95rem;
  box-shadow:0 0 12px rgba(255,107,157,.5);
}
.fret-cell-g.done{background:rgba(78,205,196,.1);border-color:rgba(78,205,196,.3);color:var(--teal);}
.cur-pos-label{
  text-align:center;padding:6px;flex-shrink:0;
  font-family:'Fredoka One',cursive;font-size:1rem;color:var(--pink);min-height:36px;
}
.gusano-controls{display:flex;gap:8px;flex-shrink:0;margin-top:6px;}
.g-btn{
  flex:1;padding:11px;border-radius:12px;border:none;
  font-family:'Nunito',sans-serif;font-weight:800;font-size:.85rem;cursor:pointer;transition:all .2s;
}
.g-btn-go{background:linear-gradient(135deg,var(--teal),#2dd4bf);color:#071A1A;}
.g-btn-pause{background:var(--card2);color:var(--muted);border:2px solid rgba(255,255,255,.1);}
.g-btn-pause:disabled{opacity:.35;cursor:default;}

/* ── METRO BLOCK ── */
.sati-stage{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--card2);border-radius:18px;margin-bottom:10px;min-height:0;
}
.sati-emoji{font-size:4.5rem;display:block;transition:transform .08s;line-height:1;}
.sati-emoji.beat{transform:scale(1.2) translateY(-8px);}
.sati-tail{font-size:1.6rem;display:block;animation:tailWag 1s infinite;transform-origin:left center;}
@keyframes tailWag{0%,100%{transform:rotate(-15deg);}50%{transform:rotate(15deg);}}
.bpm-num{font-family:'Fredoka One',cursive;font-size:3rem;color:var(--teal);line-height:1;margin:4px 0 0;}
.bpm-lbl{font-size:.72rem;color:var(--muted);font-weight:700;}
.beat-dots{display:flex;gap:7px;margin-top:10px;}
.bdot{width:13px;height:13px;border-radius:50%;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.12);transition:all .08s;}
.bdot.lit{background:var(--teal);border-color:var(--teal);box-shadow:0 0 10px var(--teal);}
.bdot.lit1{background:var(--yellow);border-color:var(--yellow);box-shadow:0 0 10px var(--yellow);}
.speed-row-m{display:flex;gap:6px;flex-shrink:0;margin-bottom:8px;}
.spd-m{
  flex:1;padding:9px 4px;border-radius:11px;border:2px solid rgba(255,255,255,.1);
  background:var(--card);cursor:pointer;text-align:center;
  font-family:'Nunito',sans-serif;font-weight:800;font-size:.75rem;color:var(--muted);transition:all .2s;
}
.spd-m.active{border-color:var(--teal);color:var(--teal);background:rgba(78,205,196,.1);}
.spd-m .si{font-size:1.2rem;display:block;margin-bottom:1px;}
.metro-ctrls{display:flex;gap:8px;flex-shrink:0;}

/* ── QUIZ BLOCK ── */
.quiz-q{
  font-family:'Fredoka One',cursive;font-size:1.15rem;
  text-align:center;line-height:1.35;margin-bottom:10px;flex-shrink:0;
  background:var(--card2);border-radius:14px;padding:14px;
}
.timer-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:10px;flex-shrink:0;}
.timer-ring-w{position:relative;width:58px;height:58px;flex-shrink:0;}
.t-svg{transform:rotate(-90deg);}
.t-bg{fill:none;stroke:rgba(255,255,255,.1);stroke-width:5;}
.t-arc{fill:none;stroke:var(--yellow);stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset .1s linear,stroke .4s;}
.t-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Fredoka One',cursive;font-size:1.4rem;color:var(--yellow);}
.pause-quiz-btn{
  padding:8px 14px;border-radius:10px;
  border:2px solid rgba(255,255,255,.15);background:var(--card2);
  color:var(--muted);font-family:'Nunito',sans-serif;font-weight:800;
  font-size:.8rem;cursor:pointer;transition:all .2s;
}
.pause-quiz-btn.paused{border-color:var(--teal);color:var(--teal);background:rgba(78,205,196,.1);}
.answers-g{display:grid;grid-template-columns:1fr 1fr;gap:7px;flex:1;align-content:start;}
.ans-g{
  padding:12px 8px;border-radius:12px;border:2px solid rgba(255,255,255,.1);
  background:var(--card);cursor:pointer;font-family:'Nunito',sans-serif;
  font-weight:800;font-size:.85rem;color:var(--text);transition:all .2s;line-height:1.3;
  text-align:center;
}
.ans-g:hover:not(:disabled){border-color:var(--yellow);background:rgba(255,217,61,.07);}
.ans-g.ok{background:rgba(74,222,128,.18);border-color:var(--green);color:var(--green);}
.ans-g.no{background:rgba(255,69,69,.14);border-color:var(--red);color:var(--red);}
.q-score{display:flex;gap:5px;justify-content:center;margin-bottom:8px;flex-shrink:0;}
.qs{font-size:1.2rem;opacity:.2;transition:all .2s;}
.qs.on{opacity:1;animation:sPop .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes sPop{0%{transform:scale(0);}100%{transform:scale(1);}}
.q-progress{font-size:.72rem;color:var(--muted);font-weight:700;text-align:center;margin-bottom:6px;flex-shrink:0;}

/* ── POSTURE BLOCK ── */
.posture-steps{display:flex;flex-direction:column;gap:8px;flex:1;justify-content:center;}
.posture-step{
  background:var(--card2);border-radius:12px;padding:12px 14px;
  display:flex;align-items:center;gap:12px;cursor:pointer;
  border:2px solid rgba(255,255,255,.06);transition:all .2s;
}
.posture-step.done{border-color:var(--green);}
.ps-icon{font-size:1.8rem;flex-shrink:0;}
.ps-info{flex:1;}
.ps-title{font-weight:800;font-size:.9rem;}
.ps-desc{font-size:.75rem;color:var(--muted);margin-top:2px;line-height:1.3;}
.ps-check{font-size:1.2rem;}

/* ── VIDEO BLOCK ── */
.video-rec{
  background:var(--card2);border-radius:16px;padding:16px;
  display:flex;flex-direction:column;align-items:center;
  gap:10px;flex:1;justify-content:center;text-align:center;
}
.video-thumb-big{font-size:4rem;}
.video-title-big{font-family:'Fredoka One',cursive;font-size:1.2rem;color:var(--teal);}
.video-desc-big{font-size:.82rem;color:var(--muted);line-height:1.5;}
.video-link{
  display:inline-block;padding:12px 22px;border-radius:14px;
  background:linear-gradient(135deg,var(--teal),#2dd4bf);
  color:#071A1A;font-family:'Fredoka One',cursive;font-size:1rem;
  text-decoration:none;margin-top:4px;
}

/* ── TÍO ALE BLOCK ── */
.ale-battle{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:12px;
}
.ale-icon-big{
  width:90px;height:90px;border-radius:50%;
  background:linear-gradient(135deg,#FF4545,#C0392B);
  display:flex;align-items:center;justify-content:center;
  font-size:3rem;border:3px solid rgba(255,255,255,.2);
  box-shadow:0 0 30px rgba(255,69,69,.5);
}
.ale-bubble{
  background:rgba(255,69,69,.1);border:2px solid rgba(255,69,69,.3);
  border-radius:14px;padding:12px 16px;
  font-family:'Fredoka One',cursive;font-size:.95rem;
  color:var(--red);text-align:center;line-height:1.4;max-width:280px;
}
.ale-vs{
  font-family:'Fredoka One',cursive;font-size:2rem;
  background:linear-gradient(135deg,var(--yellow),var(--orange));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* ── LOCKED SCREEN ── */
#locked-screen{
  position:fixed;inset:0;z-index:50;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;
  justify-content:flex-start;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:max(20px,env(safe-area-inset-top)) 20px max(40px,env(safe-area-inset-bottom));
  text-align:center;
  animation:fadeIn .5s ease;
}
#locked-screen>div{
  width:100%;max-width:460px;
  display:flex;flex-direction:column;align-items:center;
  padding-bottom:24px;
}
.lock-moon{font-size:5rem;margin-bottom:12px;animation:moonFloat 3s ease-in-out infinite;}
@keyframes moonFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.lock-title{
  font-family:'Fredoka One',cursive;font-size:1.8rem;margin-bottom:6px;
  background:linear-gradient(135deg,var(--pink),var(--yellow),var(--teal));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.lock-msg{font-size:.9rem;color:var(--muted);line-height:1.6;margin-bottom:16px;max-width:320px;}
.lock-learned{
  background:var(--card);border-radius:16px;padding:14px 20px;
  font-size:.88rem;font-weight:700;color:var(--text);
  margin-bottom:14px;max-width:320px;line-height:1.5;
}
.lock-tomorrow{
  background:rgba(78,205,196,.1);border:2px solid rgba(78,205,196,.2);
  border-radius:14px;padding:10px 16px;
  font-size:.82rem;color:var(--teal);font-weight:700;max-width:320px;
}
.lock-stats{display:flex;gap:16px;margin:14px 0;}
.lock-stat{
  background:var(--card);border-radius:12px;padding:12px 16px;text-align:center;flex:1;
}
.lock-stat-num{font-family:'Fredoka One',cursive;font-size:1.8rem;color:var(--yellow);}
.lock-stat-lbl{font-size:.65rem;color:var(--muted);font-weight:700;margin-top:2px;}
.lock-rank{
  font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--yellow);
  display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:14px;
}
.lock-next-day{
  font-size:.78rem;color:rgba(240,230,255,.4);font-weight:600;margin-top:10px;
}

/* ── COMPLETE SCREEN (within session) ── */
.complete-block{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:10px;text-align:center;padding:10px 0;
}
.complete-emoji{font-size:4rem;animation:popIn .5s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{0%{transform:scale(0);}100%{transform:scale(1);}}
.complete-title{
  font-family:'Fredoka One',cursive;font-size:1.6rem;
  background:linear-gradient(135deg,var(--pink),var(--yellow));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.complete-learned{
  background:var(--card2);border-radius:14px;padding:12px 16px;
  font-size:.85rem;font-weight:700;line-height:1.5;max-width:300px;
}
.complete-stars{font-family:'Fredoka One',cursive;font-size:1.4rem;color:var(--yellow);}
.complete-tomorrow{
  background:rgba(78,205,196,.1);border:2px solid rgba(78,205,196,.2);
  border-radius:12px;padding:10px 14px;
  font-size:.8rem;color:var(--teal);font-weight:700;max-width:300px;
}

/* ── PROGRESS MAP (shown in locked screen) ── */
.progress-map{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;max-width:300px;margin:10px auto;}
.pm-dot{
  width:26px;height:26px;border-radius:50%;
  background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;color:var(--muted);
}
.pm-dot.done{background:var(--teal);border-color:var(--teal);color:#071A1A;}
.pm-dot.today{background:var(--pink);border-color:var(--pink);color:white;box-shadow:0 0 10px var(--pink);}
.pm-dot.rest{background:rgba(168,85,247,.3);border-color:var(--purple);color:var(--purple);}
.pm-dot.battle{background:rgba(255,69,69,.3);border-color:var(--red);color:var(--red);}

/* ── MELODY BLOCK ── */
.melody-notes{display:flex;flex-direction:column;gap:6px;flex:1;justify-content:center;}
.melody-step{
  display:flex;align-items:center;gap:10px;
  background:var(--card2);border-radius:12px;padding:10px 14px;
  border:2px solid transparent;transition:all .2s;cursor:pointer;
}
.melody-step.active-step{
  border-color:var(--pink);background:rgba(255,107,157,.1);
  box-shadow:0 0 12px rgba(255,107,157,.3);
}
.melody-step.done-step{border-color:rgba(78,205,196,.4);}
.ms-note{
  width:36px;height:36px;border-radius:50%;
  background:var(--card);display:flex;align-items:center;justify-content:center;
  font-family:'Fredoka One',cursive;font-size:1rem;color:var(--yellow);flex-shrink:0;
}
.ms-info{flex:1;}
.ms-string{font-weight:800;font-size:.85rem;}
.ms-finger{font-size:.72rem;color:var(--muted);}
.ms-check{font-size:1.1rem;}

/* ── CHORD BLOCK ── */
.chord-diagram{
  background:var(--card2);border-radius:16px;padding:14px;
  display:flex;justify-content:center;align-items:center;
  flex:1;max-height:220px;
}

/* ── ANIMATIONS ── */
/* ── CHALLENGE BLOCK ── */
.challenge-wrap{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:14px;
}
.challenge-badge{
  font-size:4rem;animation:popIn .5s cubic-bezier(.34,1.56,.64,1);
}
.challenge-box{
  background:linear-gradient(135deg,rgba(255,140,66,.12),rgba(255,107,157,.08));
  border:2px solid rgba(255,140,66,.35);
  border-radius:18px;padding:18px 20px;
  max-width:320px;text-align:center;
}
.challenge-task{
  font-family:'Fredoka One',cursive;font-size:1.1rem;
  line-height:1.4;color:var(--text);margin-bottom:12px;
}
.challenge-timer-ring{
  position:relative;width:80px;height:80px;margin:0 auto 12px;
}
.challenge-timer-num{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Fredoka One',cursive;font-size:1.5rem;color:var(--orange);
}
.challenge-bonus{
  font-size:.78rem;color:var(--muted);font-weight:700;
  background:rgba(255,255,255,.06);border-radius:8px;padding:5px 10px;
  margin-top:4px;display:inline-block;
}
.challenge-done{
  background:rgba(74,222,128,.12);border:2px solid rgba(74,222,128,.3);
  border-radius:14px;padding:14px;text-align:center;margin-top:8px;
  font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--green);
  display:none;
}
.challenge-done.show{display:block;}
.challenge-btns{display:flex;gap:10px;width:100%;max-width:320px;}

/* ── RECORD BLOCK ── */
.record-wrap{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:14px;
}
.record-mic{
  width:90px;height:90px;border-radius:50%;
  background:linear-gradient(135deg,var(--pink),var(--purple));
  display:flex;align-items:center;justify-content:center;
  font-size:2.8rem;cursor:pointer;
  box-shadow:0 0 0 0 rgba(255,107,157,.4);
  transition:all .2s;
}
.record-mic.recording{
  animation:recordPulse 1s infinite;
  background:linear-gradient(135deg,var(--red),#C0392B);
}
@keyframes recordPulse{
  0%{box-shadow:0 0 0 0 rgba(255,69,69,.5);}
  70%{box-shadow:0 0 0 20px rgba(255,69,69,0);}
  100%{box-shadow:0 0 0 0 rgba(255,69,69,0);}
}
.record-status{
  font-family:'Fredoka One',cursive;font-size:1.1rem;
  color:var(--muted);text-align:center;
}
.record-timer{
  font-family:'Fredoka One',cursive;font-size:2.5rem;
  color:var(--pink);line-height:1;
}
.record-waveform{
  display:flex;align-items:center;gap:3px;height:40px;
}
.record-bar{
  width:4px;border-radius:2px;background:var(--pink);
  animation:waveAnim .6s ease-in-out infinite;
}
.record-bar:nth-child(2){animation-delay:.1s;}
.record-bar:nth-child(3){animation-delay:.2s;}
.record-bar:nth-child(4){animation-delay:.3s;}
.record-bar:nth-child(5){animation-delay:.4s;}
.record-bar:nth-child(6){animation-delay:.15s;}
.record-bar:nth-child(7){animation-delay:.25s;}
@keyframes waveAnim{
  0%,100%{height:6px;opacity:.4;}
  50%{height:30px;opacity:1;}
}
.playback-area{
  background:var(--card2);border-radius:14px;padding:14px 16px;
  text-align:center;width:100%;max-width:300px;
}
.play-rec-btn{
  padding:12px 24px;border-radius:12px;border:none;

  cursor:pointer;transition:all .2s;margin-top:8px;
}

@keyframes pinShake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-8px);}40%,80%{transform:translateX(8px);}}

@keyframes pinSuccess{0%{transform:scale(1);}50%{transform:scale(1.15);}100%{transform:scale(1);}}

<script>
// ════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════
const S = {
  stars: 0,
  daysCompleted: 0,
  streak: 0,
  currentDay: 1,
  currentStep: 0,
  sessionDone: false,
  stickers: [],
};

function save(){ try{localStorage.setItem('feli_v3',JSON.stringify(S));}catch(e){} }
function load(){
  try{
    const d=localStorage.getItem('feli_v3');
    if(d) Object.assign(S,JSON.parse(d));
  }catch(e){}
}

function addStars(n){
  S.stars+=n;
  updateHeader();
  save();
}

let audioCtx=null;
function getAC(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playTone(freq,dur=.4,type='sine',vol=.25){
  try{
    const ac=getAC(),o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.frequency.value=freq;o.type=type;
    g.gain.setValueAtTime(vol,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+dur);
    o.start();o.stop(ac.currentTime+dur);
  }catch(e){}
}
function playString(freq){
  try{
    const ac=getAC();
    [{f:freq,t:'sawtooth',v:.25,d:1.2},{f:freq*2,t:'sine',v:.08,d:.8}].forEach(({f,t,v,d})=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.frequency.value=f;o.type=t;
      g.gain.setValueAtTime(v,ac.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);
      o.start();o.stop(ac.currentTime+d);
    });
  }catch(e){}
}
function playClick(accent=false){playTone(accent?1200:800,.05,'square',.3);}
function playSuccess(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,.3,'sine',.25),i*120));}
function playWrong(){playTone(180,.35,'sawtooth',.2);}

// CONFETTI

const cnv=qs('#cnv');
const ctx=cnv.getContext('2d');
let parts2=[];
function resizeCnv(){cnv.width=innerWidth;cnv.height=innerHeight;}
window.addEventListener('resize',resizeCnv);resizeCnv();
function confetti(big=false){
  const cols=['#FF6B9D','#FFD93D','#4ECDC4','#A855F7','#FF8C42','#4ADE80'];
  const count=big?120:60;
  for(let i=0;i<count;i++){
    parts2.push({x:Math.random()*cnv.width,y:-10,r:Math.random()*6+3,d:Math.random()*4+2,c:cols[Math.floor(Math.random()*cols.length)],t:0,ts:Math.random()*.1+.04});
  }
  if(!rafId)animCnv();
}
let rafId=null;
function animCnv(){
  ctx.clearRect(0,0,cnv.width,cnv.height);
  parts2.forEach(p=>{p.y+=p.d;p.t+=p.ts;ctx.beginPath();ctx.lineWidth=p.r/2;ctx.strokeStyle=p.c;ctx.moveTo(p.x+Math.sin(p.t)*15+p.r/2,p.y);ctx.lineTo(p.x+Math.sin(p.t)*15,p.y+p.r*1.5);ctx.stroke();});
  parts2=parts2.filter(p=>p.y<cnv.height+20);
  if(parts2.length>0){rafId=requestAnimationFrame(animCnv);}else{rafId=null;ctx.clearRect(0,0,cnv.width,cnv.height);}
}

  updateHeader();
  const steps=getStepsForDay(dayData);
  buildStepBar(steps.length+1);
  renderStep();
}

function renderStep(){
  const dayData=DAYS[S.currentDay-1];
  if(!dayData)return;
  const steps=getStepsForDay(dayData);
  const step=steps[S.currentStep];
  updateHeader();
  buildStepBar(steps.length+1);

  if(!step){
    // All steps done — show completion
    renderComplete(dayData);
    return;
  }

  const content=qs('#zone-content');
  content.innerHTML='';

  switch(step.type){
    case 'posture': renderPosture(step,dayData); break;
    case 'parts': renderParts(step,dayData); break;
    case 'strings': renderStrings(step,dayData); break;
    case 'notes': renderNotes(step,dayData); break;
    case 'gusano': renderGusano(step,dayData); break;
    case 'metro': renderMetro(step,dayData); break;
    case 'quiz': case 'ale': renderQuiz(step,dayData); break;
    case 'video': renderVideo(step,dayData); break;
    case 'melody': renderMelody(step,dayData); break;
    case 'chord': renderChord(step,dayData); break;
    case 'challenge': renderChallenge(step,dayData); break;
    case 'record': renderRecord(step,dayData); break;
  }
}

function advanceStep(){
  const dayData=DAYS[S.currentDay-1];
  const steps=getStepsForDay(dayData);
  const step=steps[S.currentStep];
  if(step) addStars(step.stars||0);
  S.currentStep++;
  save();
  renderStep();
}

const GFINGERS=['☝️ Índice','✌️ Mayor','🤞 Anular','🤙 Meñique'];

function startGusanoBlock(){
  if(gInt)return;
  qs('#gpause').disabled=false;
  gInt=setInterval(gusanoTick,gSpeed);
}
function pauseGusanoBlock(){
  const pb=qs('#gpause');
  if(gInt){clearInterval(gInt);gInt=null;pb.textContent='▶️';if(qs('#bella'))qs('#bella').classList.remove('bella-run');}
  else{gInt=setInterval(gusanoTick,gSpeed);pb.textContent='⏸️';if(qs('#bella'))qs('#bella').classList.add('bella-run');}
}
function resetGusanoBlock(){
  clearInterval(gInt);gInt=null;gStep=0;
  document.querySelectorAll('.fret-cell-g').forEach(c=>{c.classList.remove('cur','done');const p=c.id.split('-');c.textContent='T'+(parseInt(p[2])+1);});
  const b=qs('#bella');if(b){b.style.left='0%';b.classList.remove('bella-run');}
  const pb=qs('#gpause');if(pb){pb.disabled=true;pb.textContent='⏸️';}
  const cp=qs('#cur-pos');if(cp)cp.textContent='Presioná Iniciar cuando estés lista';
}
function gusanoTick(){
  const total=gStrings.length*4;
  document.querySelectorAll('.fret-cell-g.cur').forEach(c=>c.classList.remove('cur'));
  if(gStep<total){
    const ri=Math.floor(gStep/4),t=gStep%4;
    const cell=qs(`#gc-${ri}-${t}`);
    if(cell){cell.classList.add('cur');cell.textContent=GFINGERS[t].split(' ')[0];}
    for(let p=0;p<gStep;p++){const pc=qs(`#gc-${Math.floor(p/4)}-${p%4}`);if(pc)pc.classList.add('done');}
    const s=STRING_DATA[gStrings[ri]];
    const cp=qs('#cur-pos');if(cp)cp.textContent=`Cuerda ${s.num} — ${s.name} · ${GFINGERS[t]}`;
    const b=qs('#bella');if(b){b.style.left=(gStep/(total-1||1))*85+'%';b.classList.add('bella-run');}
    playClick(t===0);
    gStep++;
  } else {
    clearInterval(gInt);gInt=null;
    const b=qs('#bella');if(b)b.classList.remove('bella-run');
    const cp=qs('#cur-pos');if(cp)cp.textContent='🐕 ¡Bella llegó! ¡Completado!';
    playSuccess();
    showToast('🐕 ¡Gusano completo!');
    setMainBtn('¡Listo! →','green',advanceStep);
  }
}

function buildBeatDots(){
  const bd=qs('#beat-dots');if(!bd)return;
  bd.innerHTML='';
  for(let i=0;i<4;i++){const d=document.createElement('div');d.className='bdot';d.id='bd'+i;bd.appendChild(d);}
}
function setMetroBpm(bpm,el){
  metroBpm=bpm;
  const disp=qs('#bpm-display');if(disp)disp.textContent=bpm;
  document.querySelectorAll('.spd-m').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  if(metroOn){stopMetroBlock();toggleMetroBlock();}
}
function toggleMetroBlock(){
  if(metroOn){stopMetroBlock();return;}
  metroOn=true;metroBeat=0;
  const btn=qs('#metro-go');if(btn)btn.textContent='⏸️ Pausar';
  metroInt=setInterval(()=>{
    const acc=metroBeat%4===0;
    playClick(acc);
    const sati=qs('#sati');if(sati){sati.classList.add('beat');setTimeout(()=>sati?.classList.remove('beat'),80);}
    document.querySelectorAll('.bdot').forEach((d,i)=>{
      d.classList.remove('lit','lit1');
      if(i===metroBeat%4)d.classList.add(acc?'lit1':'lit');
    });
    metroBeat++;
  },60000/metroBpm);
  metroInt;
}
function stopMetroBlock(){
  metroOn=false;clearInterval(metroInt);metroInt=null;
  const btn=qs('#metro-go');if(btn)btn.textContent='▶️ Iniciar';
  document.querySelectorAll('.bdot').forEach(d=>d.classList.remove('lit','lit1'));
}

  _quizIsAle=step.type==='ale';
  quizQs=[...(_quizContent.questions||[])];
  if(_quizContent.big) quizQs=shuffle(quizQs);
  quizIdx=0;quizScore=0;quizPaused=false;

  if(_quizIsAle){
    qs('#zone-content').innerHTML=`
      <div class="content-block">
        <div class="block-title">😤 ${_quizContent.title}</div>
        <div class="ale-battle">
          <div class="ale-icon-big">😤</div>
          <div class="ale-vs">VS</div>
          <div style="font-family:'Fredoka One',cursive;font-size:1.5rem;color:var(--pink);">¡Vos, Feli!</div>
          <div class="ale-bubble">"${_quizContent.taunt}"</div>
        </div>
      </div>`;
    setMainBtn('¡Aceptar desafío! 🥊','yellow',renderQuizQuestion);
  } else {
    renderQuizQuestion();
  }
}

function shuffle(a){return[...a].sort(()=>Math.random()-.5);}

function renderQuizQuestion(){
  if(quizIdx>=quizQs.length){endQuiz();return;}
  const q=quizQs[quizIdx];
  quizTime=QUIZ_TOTAL_TIME;
  quizPaused=false;

  const scoreHtml=Array.from({length:quizQs.length},(_,i)=>
    `<span class="qs${i<quizScore?' on':''}" id="qs${i}">⭐</span>`
  ).join('');

  // Render buttons with data-answer attribute — no inline JS string escaping
  const shuffledOpts=shuffle(q.opts);
  const ansHtml=shuffledOpts.map(o=>
    `<button class="ans-g" data-opt="${o.replace(/"/g,'&quot;')}">${o}</button>`
  ).join('');

  qs('#zone-content').innerHTML=`
    <div class="content-block">
      <div class="block-title" style="font-size:1rem;">${_quizIsAle?'😤 Desafío':'🔍 Quiz'}</div>
      <div class="q-progress">Pregunta ${quizIdx+1} de ${quizQs.length}</div>
      <div class="q-score">${scoreHtml}</div>
      <div class="quiz-q">${q.q}</div>
      <div class="timer-row">
        <div class="timer-ring-w">
          <svg class="t-svg" width="58" height="58" viewBox="0 0 58 58">
            <circle class="t-bg" cx="29" cy="29" r="23"/>
            <circle class="t-arc" id="t-arc" cx="29" cy="29" r="23"
              stroke-dasharray="${TIMER_CIRC}" stroke-dashoffset="0"/>
          </svg>
          <div class="t-center" id="t-num">${QUIZ_TOTAL_TIME}</div>
        </div>
        <button class="pause-quiz-btn" id="pause-qbtn" onclick="toggleQuizPause()">⏸️ Frenar</button>
      </div>
      <div class="answers-g" id="ans-grid">${ansHtml}</div>
    </div>`;

  // Attach click handlers via JS — safe, no escaping issues
  document.querySelectorAll('.ans-g').forEach(btn=>{
    btn.addEventListener('click',()=>handleQuizAns(btn,btn.dataset.opt,q.a));
  });

  setMainBtn('','',null,true);
  startQuizTimer(q.a);
}

function toggleQuizPause(){
  quizPaused=!quizPaused;
  const btn=qs('#pause-qbtn');
  if(btn){
    btn.textContent=quizPaused?'▶️ Seguir':'⏸️ Frenar';
    btn.classList.toggle('paused',quizPaused);
  }
}

function startQuizTimer(correctAnswer){
  clearInterval(quizTimer);
  quizTimer=setInterval(()=>{
    if(quizPaused)return;
    quizTime--;
    const arc=qs('#t-arc'),num=qs('#t-num');
    if(arc) arc.style.strokeDashoffset=TIMER_CIRC-(quizTime/QUIZ_TOTAL_TIME)*TIMER_CIRC;
    if(num) num.textContent=quizTime;
    const color=quizTime>30?'var(--yellow)':quizTime>10?'var(--orange)':'var(--red)';
    if(arc) arc.style.stroke=color;
    if(num) num.style.color=color;
    if(quizTime<=0){
      clearInterval(quizTimer);
      playWrong();
      showToast('⏰ Era: '+correctAnswer);
      document.querySelectorAll('.ans-g').forEach(b=>{
        if(b.dataset.opt===correctAnswer) b.classList.add('ok');
        b.disabled=true;
      });
      setTimeout(()=>{quizIdx++;renderQuizQuestion();},1200);
    }
  },1000);
}

function handleQuizAns(btn,chosen,correct){
  clearInterval(quizTimer);
  document.querySelectorAll('.ans-g').forEach(b=>b.disabled=true);
  if(chosen===correct){
    btn.classList.add('ok');
    playSuccess();
    quizScore++;
    const star=qs(`#qs${quizIdx}`);
    if(star) star.classList.add('on');
    showToast('✅ ¡Correcto!');
  } else {
    btn.classList.add('no');
    playWrong();
    document.querySelectorAll('.ans-g').forEach(b=>{
      if(b.dataset.opt===correct) b.classList.add('ok');
    });
    showToast('❌ Era: '+correct);
  }
  setTimeout(()=>{quizIdx++;renderQuizQuestion();},1100);
}

function endQuiz(){
  clearInterval(quizTimer);
  const c=_quizContent;
  const isAle=_quizIsAle;
  const pct=quizScore/quizQs.length;
  const won=pct>=0.6;
  if(isAle){
    const msg=won?c.winText:c.loseText;
    qs('#zone-content').innerHTML=`
      <div class="content-block">
        <div class="ale-battle">
          <div class="ale-icon-big">${won?'🏳️':'😏'}</div>
          <div class="ale-bubble">"${msg}"</div>
          <div style="font-family:'Fredoka One',cursive;font-size:1.3rem;color:${won?'var(--green)':'var(--yellow)'};">
            ${won?'¡GANASTE! 🏆':'¡Casi! 💪'}
          </div>
          <div style="font-size:.85rem;color:var(--muted);font-weight:700;">
            Acertaste ${quizScore} de ${quizQs.length}
          </div>
        </div>
      </div>`;
    if(won){confetti(true);playSuccess();}
  } else {
    qs('#zone-content').innerHTML=`
      <div class="content-block">
        <div class="complete-block">
          <div class="complete-emoji">${pct>=0.8?'🏆':pct>=0.6?'🌟':'💪'}</div>
          <div class="complete-title">${pct>=0.8?'¡Excelente!':pct>=0.6?'¡Bien!':'¡Seguí practicando!'}</div>
          <div class="complete-stars">${quizScore} de ${quizQs.length} ⭐</div>
        </div>
      </div>`;
    if(pct>=0.8)confetti();
  }
  setMainBtn('¡Listo! →','green',advanceStep);
}

function renderMelody(step,dayData){
  const c=step.content;
  let active=0;

  const rows=c.notes.map((n,i)=>`
    <div class="melody-step ${i===0?'active-step':''}" id="ms-${i}" onclick="playMelodyNote(${i})">
      <div class="ms-note">${n.traste===-1?'🎵':n.note}</div>
      <div class="ms-info">
        <div class="ms-string">${n.string}</div>
        <div class="ms-finger">${n.finger}</div>
      </div>
      <div class="ms-check" id="msc-${i}">▶️</div>
    </div>`).join('');

  qs('#zone-content').innerHTML=`
    <div class="content-block">
      <div class="block-title">${c.cancion}</div>
      <div class="block-subtitle">${c.title} — Tocá cada nota en orden</div>
      <div class="melody-notes">${rows}</div>
    </div>`;
  setMainBtn('Tocá las notas en orden','',null,true);

  window._melodyActive=0;
  window._melodyTotal=c.notes.length;
  window.playMelodyNote=function(i){
    if(i!==window._melodyActive)return;
    const n=c.notes[i];
    if(n.traste>=0) playString(STRING_DATA[5-Math.min(n.traste,5)]?.freq||330);
    else playTone(600,.3);
    qs(`#ms-${i}`).classList.remove('active-step');
    qs(`#ms-${i}`).classList.add('done-step');
    qs(`#msc-${i}`).textContent='✅';
    window._melodyActive++;
    if(window._melodyActive<window._melodyTotal){
      qs(`#ms-${window._melodyActive}`)?.classList.add('active-step');
      qs(`#msc-${window._melodyActive}`).textContent='▶️';
    } else {
      setMainBtn('¡Listo! →','green',advanceStep);
      showToast('🌟 ¡Estrellita!');
      playSuccess();
    }
  };
}

// RENDER: CHORD
// ════════════════════════════════════════════
function renderChord(step,dayData){
  const c=step.content;

  // Build chord diagram SVG
  const STRINGS=6;const FRETS=4;
  const sw=40;const fh=36;const ox=50;const oy=30;
  let svg=`<svg viewBox="0 0 ${ox+sw*STRINGS+20} ${oy+fh*FRETS+20}" width="180" height="160">`;
  // Nut
  svg+=`<rect x="${ox}" y="${oy-3}" width="${sw*(STRINGS-1)}" height="4" fill="#F0E6C8"/>`;
  // Frets
  for(let f=0;f<=FRETS;f++){svg+=`<line x1="${ox}" y1="${oy+f*fh}" x2="${ox+sw*(STRINGS-1)}" y2="${oy+f*fh}" stroke="rgba(255,255,255,.2)" stroke-width="1.5"/>`;}
  // Strings lines
  for(let s=0;s<STRINGS;s++){svg+=`<line x1="${ox+s*sw}" y1="${oy}" x2="${ox+s*sw}" y2="${oy+fh*FRETS}" stroke="rgba(255,255,255,.3)" stroke-width="1.5"/>`;}
  // Open strings
  (c.openStrings||[]).forEach(sn=>{const x=ox+(6-sn)*sw;svg+=`<circle cx="${x}" cy="${oy-14}" r="7" fill="none" stroke="${'#4ADE80'}" stroke-width="2"/>`;});
  // Muted strings (not open, not fingered)
  const fingerStrings=c.fingers.map(f=>f.string);
  const openSt=c.openStrings||[];
  for(let sn=1;sn<=6;sn++){
    if(!fingerStrings.includes(sn)&&!openSt.includes(sn)){
      const x=ox+(6-sn)*sw;
      svg+=`<text x="${x}" y="${oy-8}" text-anchor="middle" font-size="14" fill="rgba(255,255,255,.3)">✕</text>`;
    }
  }
  // Finger dots
  c.fingers.forEach(f=>{
    const x=ox+(6-f.string)*sw;const y=oy+(f.fret-0.5)*fh;
    const colors=['','#FF6B9D','#FFD93D','#4ECDC4','#A855F7'];
    svg+=`<circle cx="${x}" cy="${y}" r="13" fill="${colors[f.finger]||'#FF6B9D'}"/>`;
    svg+=`<text x="${x}" y="${y+5}" text-anchor="middle" font-size="11" font-weight="bold" fill="white">${f.finger}</text>`;
  });
  svg+='</svg>';

  qs('#zone-content').innerHTML=`
    <div class="content-block">
      <div class="block-title">${c.title}</div>
      <div class="block-subtitle">${c.subtitle}</div>
      <div class="chord-diagram">${svg}</div>
      <div class="c-card" style="margin-top:10px;">
        ${c.fingers.map(f=>`
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
            <div style="width:28px;height:28px;border-radius:50%;background:${['','#FF6B9D','#FFD93D','#4ECDC4','#A855F7'][f.finger]||'#FF6B9D'};display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.85rem;color:white;flex-shrink:0;">${f.finger}</div>
            <div style="font-size:.82rem;"><strong style="color:var(--text)">${f.label}</strong> — Cuerda ${f.string}, traste ${f.fret}</div>
          </div>`).join('')}
        <div class="tip" style="margin-top:6px;"><strong>💡</strong> ${c.tip}</div>
      </div>
    </div>`;
  setMainBtn('¡Listo, lo practiqué! →','green',advanceStep);
}

function lockSession(dayData){

  clearInterval(gInt);gInt=null;
  clearInterval(metroInt);metroInt=null;
  clearInterval(quizTimer);quizTimer=null;

  S.sessionDone=true;
  S.daysCompleted++;

function showLocked(dayData){
  const locked=qs('#locked-screen');
  const r=getRank();
  const nextDay=DAYS[S.currentDay]||null;

  qs('#lock-msg').textContent='Descansá los dedos. La guitarra te espera en la próxima sesión.';
  qs('#lock-learned').innerHTML=`<strong>Hoy aprendiste:</strong><br>${dayData?.learned||'¡Gran sesión!'}`;

  buildLockMap();

  locked.style.display='flex';
  qs('#app').style.display='none';

  // Always remove and recreate the button so onclick is always fresh
  const old=qs('#next-session-btn');
  if(old) old.remove();

  const btn=document.createElement('button');
  btn.id='next-session-btn';
  btn.textContent='▶️ Siguiente sesión';
  btn.style.cssText='margin-top:16px;padding:14px 28px;border-radius:16px;background:linear-gradient(135deg,var(--pink),var(--purple));border:none;color:white;font-family:"Fredoka One",cursive;font-size:1rem;cursor:pointer;box-shadow:0 6px 20px rgba(168,85,247,.4);';
  btn.onclick=advanceToNextDay;
  qs('#locked-screen').querySelector('div').appendChild(btn);
}

function advanceToNextDay(){
  S.currentDay++;
  S.currentStep=0;
  S.sessionDone=false;
  save();
  goToApp();
  startSession();
}

function buildLockMap(){
  const map=qs('#lock-map');if(!map)return;
  map.innerHTML='';
  for(let i=0;i<Math.min(S.currentDay,30);i++){
    const d=DAYS[i];
    const dot=document.createElement('div');
    dot.className='pm-dot'+(i<S.daysCompleted?' done':i===S.daysCompleted-1?' today':'');
    if(d?.type==='rest')dot.classList.add('rest');
    if(d?.type==='battle')dot.classList.add('battle');
    dot.textContent=i+1;
    map.appendChild(dot);
  }
}

// PIN / RESET
// ════════════════════════════════════════════
const CORRECT_PIN='1234';
let _pinBuffer='';
let _pinAction=null; // 'day' | 'all'

function askPin(action){
  _pinAction=action;
  _pinBuffer='';
  const modal=qs('#pin-modal');
  const icon=qs('#pin-icon');
  const title=qs('#pin-title');
  const desc=qs('#pin-desc');
  if(action==='day'){
    icon.textContent='🔄';
    title.textContent='Reiniciar día';
    desc.textContent='Ingresá la clave para repetir la sesión de hoy desde el principio';
  } else {
    icon.textContent='⚠️';
    title.textContent='Reiniciar todo el progreso';
    desc.textContent='Ingresá la clave para borrar todo y empezar desde el Día 1';
  }
  updatePinDots();
  modal.style.display='flex';
}

function closePinModal(){
  _pinBuffer='';
  _pinAction=null;
  qs('#pin-modal').style.display='none';
  updatePinDots();
}

function pinPress(digit){
  if(_pinBuffer.length>=4)return;
  _pinBuffer+=digit;
  updatePinDots();
  if(_pinBuffer.length===4) setTimeout(checkPin,120);
}

function pinDel(){
  _pinBuffer=_pinBuffer.slice(0,-1);
  updatePinDots();
}

function pinClear(){
  _pinBuffer='';
  updatePinDots();
}

function updatePinDots(){
  for(let i=0;i<4;i++){
    const dot=qs('#pd'+i);
    if(!dot)return;
    if(i<_pinBuffer.length){
      dot.style.background='var(--pink)';
      dot.style.borderColor='var(--pink)';
      dot.style.boxShadow='0 0 8px rgba(255,107,157,.6)';
    } else {
      dot.style.background='transparent';
      dot.style.borderColor='rgba(255,255,255,.2)';
      dot.style.boxShadow='none';
    }
  }
}

function checkPin(){
  if(_pinBuffer===CORRECT_PIN){
    for(let i=0;i<4;i++){
      const dot=qs('#pd'+i);
      if(dot){dot.style.background='var(--green)';dot.style.borderColor='var(--green)';}
    }
    const action=_pinAction; // save BEFORE closePinModal nullifies it
    const prevTarget=_prevDayTarget;
    setTimeout(()=>{
      closePinModal();
      if(action==='day') doResetDay();
      else if(action==='all') doResetAll();
      else if(action==='prevday') doReplayDay(prevTarget);
    },400);
  } else {
    // Wrong — shake and clear
    const dotsEl=qs('#pin-dots');
    if(dotsEl){
      dotsEl.classList.add('pin-shake');
      setTimeout(()=>dotsEl.classList.remove('pin-shake'),400);
    }
    for(let i=0;i<4;i++){
      const dot=qs('#pd'+i);
      if(dot){dot.style.background='var(--red)';dot.style.borderColor='var(--red)';}
    }
    setTimeout(()=>{_pinBuffer='';updatePinDots();},600);
    showToast('❌ Clave incorrecta');
  }
}

function doReplayDay(dayIndex){
  // Replay a previous day without affecting overall progress
  S.currentDay=dayIndex+1;
  S.currentStep=0;
  S.sessionDone=false;
  save();
  showToast('📚 Rehaciendo día '+(dayIndex+1));
  goToApp();
  startSession();
}

function goToApp(){
  qs('#locked-screen').style.display='none';
  qs('#pin-modal').style.display='none';
  qs('#app').style.display='flex';
  // Stop any lingering timers
  clearInterval(gInt);gInt=null;
  clearInterval(metroInt);metroInt=null;
  clearInterval(quizTimer);quizTimer=null;
}

function doResetDay(){
  S.currentStep=0;
  S.sessionDone=false;
  save();
  showToast('🔄 Día reiniciado — ¡a practicar!');
  goToApp();
  startSession();
}

function doResetAll(){
  Object.assign(S,{
    stars:0,daysCompleted:0,streak:0,
    currentDay:1,currentStep:0,
    sessionDone:false,stickers:[]
  });
  save();
  showToast('⚠️ Progreso reiniciado — ¡Día 1!');
  goToApp();
  startSession();
}

function renderChallenge(step){
  const c=step.content;
  let timeLeft=c.timer||120;
  let timerRunning=false;
  let challengeDone=false;
  const CIRC=213.6; // r=34 circle

  qs('#zone-content').innerHTML=`
    <div class="content-block">
      <div class="block-title">${c.title} <span style="font-size:.75em;color:var(--orange);">✨ Extra</span></div>
      <div class="challenge-wrap">
        <div class="challenge-badge">${c.emoji}</div>
        <div class="challenge-box">
          <div class="challenge-task">${c.task}</div>
          <div class="challenge-timer-ring">
            <svg style="transform:rotate(-90deg)" width="80" height="80" viewBox="0 0 80 80">
              <circle cx="40" cy="40" r="34" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="6"/>
              <circle id="ch-arc" cx="40" cy="40" r="34" fill="none"
                stroke="var(--orange)" stroke-width="6" stroke-linecap="round"
                stroke-dasharray="${CIRC}" stroke-dashoffset="0"/>
            </svg>
            <div class="challenge-timer-num" id="ch-num">${formatTime(timeLeft)}</div>
          </div>
          <div class="challenge-bonus">⭐ +${c.stars} bonus si lo hacés</div>
        </div>
        <div class="challenge-done" id="ch-done">🎉 ¡Reto completado! +${c.stars} ⭐</div>
        <div class="challenge-btns">
          <button class="g-btn g-btn-go" id="ch-start" onclick="startChallengeTimer(${c.timer},${CIRC})" style="flex:2;">▶️ Empezar timer</button>
          <button class="g-btn g-btn-pause" id="ch-skip" onclick="skipChallenge()" style="flex:1;">Saltar →</button>
        </div>
        <button class="main-btn green" id="ch-done-btn" onclick="completeChallenge(${c.stars})" style="display:none;width:100%;max-width:320px;">
          🎸 ¡Lo hice! +${c.stars} ⭐
        </button>
      </div>
    </div>`;
  setMainBtn('','',null,true); // hide main btn — challenge has its own buttons

  window._challengeTimeLeft=timeLeft;
  window._challengeTotal=c.timer||120;
}

function formatTime(s){
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

function startChallengeTimer(total,circ){
  clearInterval(_challengeTimer);
  qs('#ch-start').disabled=true;
  qs('#ch-start').textContent='⏱️ Corriendo...';
  qs('#ch-done-btn').style.display='block';

  _challengeTimer=setInterval(()=>{
    window._challengeTimeLeft--;
    const t=window._challengeTimeLeft;
    const num=qs('#ch-num');
    const arc=qs('#ch-arc');
    if(num) num.textContent=formatTime(t);
    if(arc) arc.style.strokeDashoffset=circ-(t/window._challengeTotal)*circ;
    const color=t>total*.5?'var(--orange)':t>total*.2?'var(--yellow)':'var(--red)';
    if(arc) arc.style.stroke=color;
    if(num) num.style.color=color;
    if(t<=0){
      clearInterval(_challengeTimer);
      if(num) num.textContent='¡Tiempo!';
      playSuccess();
    }
  },1000);
}

function completeChallenge(stars){
  clearInterval(_challengeTimer);
  addStars(stars);
  const done=qs('#ch-done');
  if(done) done.classList.add('show');
  qs('#ch-done-btn').style.display='none';
  const skipBtn=qs('#ch-skip');
  if(skipBtn){skipBtn.textContent='¡Siguiente →';skipBtn.style.background='rgba(74,222,128,.2)';skipBtn.style.color='var(--green)';}
  confetti();
  showToast(`🎸 ¡Reto completado! +${stars} ⭐`);
}

function skipChallenge(){
  clearInterval(_challengeTimer);
  // No stars if skipped — advance without calling addStars
  S.currentStep++;
  save();
  renderStep();
}

// ════════════════════════════════════════════
// RENDER: RECORD (microphone recording)
// ════════════════════════════════════════════
let _mediaRecorder=null;
let _audioChunks=[];
let _recordInterval=null;
let _recordedBlob=null;

function renderRecord(step){
  const c=step.content;

  qs('#zone-content').innerHTML=`
    <div class="content-block">
      <div class="block-title">${c.title} <span style="font-size:.75em;color:var(--purple);">✨ Extra</span></div>
      <div class="block-subtitle">${c.subtitle}</div>
      <div class="record-wrap">
        <div class="record-mic" id="rec-mic" onclick="toggleRecording()">🎙️</div>
        <div class="record-status" id="rec-status">Tocá el micrófono para grabar</div>
        <div class="record-timer" id="rec-timer" style="display:none;">0:30</div>
        <div class="record-waveform" id="rec-wave" style="display:none;">
          ${Array.from({length:7},(_,i)=>`<div class="record-bar" style="animation-delay:${i*.08}s"></div>`).join('')}
        </div>
        <div class="playback-area" id="rec-playback" style="display:none;">
          <div style="font-size:.85rem;font-weight:700;color:var(--teal);margin-bottom:6px;">¡Grabado! ¿Cómo sonó?</div>
          <button class="play-rec-btn" onclick="playRecording()">▶️ Escucharme</button>
          <audio id="rec-audio" style="display:none;"></audio>
        </div>
      </div>
    </div>`;
  setMainBtn('Saltar →','teal',()=>{S.currentStep++;save();renderStep();});
}

async function toggleRecording(){
  if(_mediaRecorder&&_mediaRecorder.state==='recording'){
    stopRecording();
    return;
  }
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    _audioChunks=[];
    _mediaRecorder=new MediaRecorder(stream);
    _mediaRecorder.ondataavailable=e=>{if(e.data.size>0)_audioChunks.push(e.data);};
    _mediaRecorder.onstop=()=>{
      _recordedBlob=new Blob(_audioChunks,{type:'audio/webm'});
      const url=URL.createObjectURL(_recordedBlob);
      const audio=qs('#rec-audio');
      if(audio) audio.src=url;
      qs('#rec-playback').style.display='block';
      qs('#rec-wave').style.display='none';
      qs('#rec-mic').classList.remove('recording');
      qs('#rec-mic').textContent='🎙️';
      qs('#rec-status').textContent='¡Grabación lista!';
      qs('#rec-timer').style.display='none';
      // Stop all tracks
      stream.getTracks().forEach(t=>t.stop());
      // Give stars
      addStars(step?.stars||2);
      setMainBtn('¡Siguiente! →','green',()=>{S.currentStep++;save();renderStep();});
    };

    _mediaRecorder.start();
    qs('#rec-mic').classList.add('recording');
    qs('#rec-mic').textContent='⏹️';
    qs('#rec-status').textContent='Grabando... Tocá la guitarra ahora';
    qs('#rec-wave').style.display='flex';

    // Countdown 30s
    let t=30;
    qs('#rec-timer').style.display='block';
    qs('#rec-timer').textContent='0:'+String(t).padStart(2,'0');
    _recordInterval=setInterval(()=>{
      t--;
      const el=qs('#rec-timer');
      if(el) el.textContent='0:'+String(t).padStart(2,'0');
      if(t<=0){clearInterval(_recordInterval);stopRecording();}
    },1000);
  }catch(err){
    showToast('🎙️ No se pudo acceder al micrófono');
    qs('#rec-status').textContent='Sin acceso al micrófono — tocá de todas formas 🎸';
  }
}

function stopRecording(){
  clearInterval(_recordInterval);
  if(_mediaRecorder&&_mediaRecorder.state!=='inactive') _mediaRecorder.stop();
}

function playRecording(){
  const audio=qs('#rec-audio');
  if(audio){audio.play();showToast('🎵 ¡Escuchate!');}
}

// ════════════════════════════════════════════
// LONGER SESSIONS (day 10+): inject extra steps
// ════════════════════════════════════════════
const WARMUP_STEP={
  type:'gusano',

    title:'Calentamiento 🔥',

    strings:[0,1,2,3,4,5],speed:1100

};

const FREE_PLAY_STEP={

    bpm:60,lockBpm:false
  },

};

// Challenge steps per day range (day 10+)
const CHALLENGES={
  10:{emoji:'🐛',title:'Reto del día',task:'Hacé el gusano 3 veces seguidas en la cuerda 6 sin mirar los dedos.',timer:120,stars:3},
  11:{emoji:'🖐️',title:'Reto del día',task:'Hacé el gusano completo (las 6 cuerdas) una vez muy lento. Que cada nota suene limpia.',timer:180,stars:3},
  12:{emoji:'🎵',title:'Reto del día',task:'Tocá cada cuerda al aire de la 6 a la 1 y decí el nombre en voz alta. Tres veces seguidas.',timer:90,stars:3},
  15:{emoji:'🌟',title:'Reto del día',task:'Tocá las primeras 4 notas de Estrellita sin mirar la pantalla. Solo de memoria.',timer:120,stars:3},
  16:{emoji:'🌟',title:'Reto del día',task:'Tocá Estrellita completa una vez. Lento está perfecto. No pares aunque te equivoques.',timer:180,stars:4},
  17:{emoji:'🎤',title:'Reto del día',task:'Cantá "Estrellita dónde estás" mientras la tocás. No importa si no sale perfecto.',timer:180,stars:4},
  20:{emoji:'🎸',title:'Reto del día',task:'Poné el acorde Em y rasgueá hacia abajo 8 veces seguidas sin que se mueva la mano.',timer:120,stars:3},
  21:{emoji:'🔄',title:'Reto del día',task:'Cambiá de Em a Am 5 veces seguidas. Tomátelo con calma, sin apuro.',timer:150,stars:4},
  24:{emoji:'🎵',title:'Reto del día',task:'Tocá Em 4 veces y Am 4 veces, en loop. ¡Eso ya es música real!',timer:180,stars:4},
  25:{emoji:'🎸',title:'Reto del día',task:'Tocá el gusano completo y después Em y Am 3 veces cada uno. Todo seguido.',timer:240,stars:5},
};

// Record step (inject from day 12+)
const RECORD_STEP={
  type:'record',
  content:{
    title:'🎙️ Grabate tocando',
    subtitle:'Tocá 30 segundos lo que quieras y escuchate. Es opcional pero muy importante.',
  },
  stars:2
};

function getChallengeForDay(dayNum){
  // Find the most recent challenge defined at or before this day
  const keys=Object.keys(CHALLENGES).map(Number).filter(k=>k<=dayNum).sort((a,b)=>b-a);
  if(keys.length===0) return null;
  return {type:'challenge',content:CHALLENGES[keys[0]],stars:CHALLENGES[keys[0]].stars};
}

function getStepsForDay(dayData){
  if(!dayData||dayData.type==='rest'||dayData.type==='graduation') return dayData.steps;
  const dayNum=dayData.day;
  if(dayNum<10) return dayData.steps;

  const warmup=WARMUP_STEP;
  const freePlay=FREE_PLAY_STEP;
  const challenge=getChallengeForDay(dayNum);
  const record=dayNum>=12?RECORD_STEP:null;

  // Base: warmup + content + free play
  let steps=[warmup,...dayData.steps,freePlay];
  // Add challenge at end (optional, before lock)
  if(challenge) steps.push(challenge);
  // Add recording from day 12
  if(record) steps.push(record);
  return steps;
}

// ════════════════════════════════════════════
// EXPORT / IMPORT
// ════════════════════════════════════════════
function exportProgress(){
  const data=JSON.stringify(S,null,2);
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='feli_guitarra_progreso.json';a.click();
  URL.revokeObjectURL(url);
  showToast('📥 Progreso guardado como feli_guitarra_progreso.json');
}

function importProgress(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=(ev)=>{
    try{
      const data=JSON.parse(ev.target.result);
      Object.assign(S,data);
      save();
      showToast('✅ Progreso cargado correctamente');
      // Reload the view
      setTimeout(()=>{
        if(S.sessionDone){
          const dayData=DAYS[S.currentDay-1];
          showLocked(dayData);
        } else {
          goToApp();
          startSession();
        }
      },800);
    }catch(err){showToast('❌ Archivo inválido');}
  };
  reader.readAsText(file);
}

// INIT
// ════════════════════════════════════════════
load();

    setMainBtn('🎸 ¡Seguí tocando!','','',false);

    qs('#app').style.display='flex';
    startSession();
  }
}

// ── SERVICE WORKER REGISTRATION ──
// Registers an inline SW via blob URL so it works from a single HTML file
if('serviceWorker' in navigator){
  const swCode=`
const CACHE='guitarra-feli-v3';
const ASSETS=[self.location.href.split('/sw-')[0]+'/'];

self.addEventListener('install',e=>{
  e.waitUntil(
    caches.open(CACHE).then(c=>c.addAll(ASSETS)).then(()=>self.skipWaiting())
  );
});

self.addEventListener('activate',e=>{
  e.waitUntil(
    caches.keys().then(keys=>Promise.all(
      keys.filter(k=>k!==CACHE).map(k=>caches.delete(k))
    )).then(()=>self.clients.claim())
  );
});

self.addEventListener('fetch',e=>{
  e.respondWith(
    caches.match(e.request).then(cached=>{
      const network=fetch(e.request).then(res=>{
        if(res&&res.status===200&&res.type==='basic'){
          const clone=res.clone();
          caches.open(CACHE).then(c=>c.put(e.request,clone));
        }
        return res;
      }).catch(()=>cached);
      return cached||network;
    })
  );
});`;
  const blob=new Blob([swCode],{type:'application/javascript'});
  const swUrl=URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl,{scope:'./'})
    .then(()=>console.log('SW registrado'))
    .catch(e=>console.log('SW no disponible:',e));
}
</script>
